<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Previous Year Question Papers</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="../css/adre/adreQpaper.css">

</head>

<body>

<nav class="navbar navbar-dark bg-primary shadow">

<div class="container">

<a class="navbar-brand fw-bold" href="#">
📚 Previous Year Question Papers
</a>

</div>

</nav>

<div class="container py-4">

<div class="row mb-4">

<div class="col-md-8 mb-2">

<input
type="text"
id="search"
class="form-control"
placeholder="Search Question Paper...">

</div>

<div class="col-md-4">

<select
id="yearFilter"
class="form-select">

<option value="">All Years</option>

</select>

</div>

</div>

<div
id="paperList"
class="row g-4">

</div>

<div
id="noData"
class="text-center text-muted py-5 d-none">

<h4>No Question Paper Found</h4>

</div>

</div>

<footer
class="bg-light border-top mt-5">

<div class="container py-3 text-center">

Made with ❤️ using HTML CSS JavaScript

</div>

</footer>

<script src="../data/adre/questionPaper/pdf.js"></script>
<script src="../js/adre/questionPaper/app.js"></script>

</body>
</html>
