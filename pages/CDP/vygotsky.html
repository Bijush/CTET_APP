<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<title>Vygotsky</title>

<meta name="viewport"
      content="width=device-width, initial-scale=1">

<link rel="stylesheet"
      href="../../css/theory.css">

</head>

<body>

<!-- ======================
HEADER
====================== -->

<div class="theory-head">

  <button class="back-btn"
          onclick="goBack()">
    ⬅
  </button>

  <h2> Vygotsky Theory</h2>

</div>

<!-- ======================
PAGE CONTENT
====================== -->

<div id="theoryBox"
     class="tab-page">
</div>

<!-- ======================
BOTTOM NAV GLASS TABS
====================== -->

<div class="bottom-tabs">

  <button class="btab active"
          onclick="openTab('definition', event)">
    <span>📘</span>
    <label>Def</label>
  </button>

  <button class="btab"
          onclick="openTab('zpd', event)">
    <span>🧠</span>
    <label>ZPD</label>
  </button>

  <button class="btab"
          onclick="openTab('criticism', event)">
    <span>⚠️</span>
    <label>Critic</label>
  </button>

  <button class="btab"
          onclick="openTab('compare', event)">
    <span>🆚</span>
    <label>Compare</label>
  </button>
<!-- Teaching -->
<button class="btab"
        onclick="openTab('teaching', event)">
  <span>👩‍🏫</span>
  <label>Teach</label>
</button>

<!-- Piaget MCQ -->
<button class="btab"
        onclick="goMCQ('vygotsky',event)">

  <span>🧠</span>
  <label>Vygotsky MCQ</label>

</button>
</div>

<!-- ======================
SCRIPT
====================== -->

<script type="module"
        src="../../js/CDP/vygotsky.js">
</script>


</body>
</html>
