<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MCQ Practice</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

 <!-- CSS  -->
  <link rel="stylesheet" href="../../../css/common.css">
  <link rel="stylesheet" href="../../../css/mcq.css">
      <link rel="stylesheet" href="../../../css/theory.css">
  


  



</head>
<body>

<!-- 🔥 Animated Gradient Floating Navbar -->
<div class="top-navbar">

  <!-- ROW 1 -->
  <div class="nav-row nav-row-1">

  <button class="top-back-btn" onclick="goBack()">
    ←
  </button>

  <h2 class="page-title">📝 Vygotsky Mcq</h2>

</div>

  <!-- ROW 2 -->
  <div class="nav-row nav-row-2">

    <div class="lang-switch" onclick="toggleLangView()">
      🌐 EN+BN
    </div>

    <select id="subjectSelect" class="subject-dropdown">
      <option value="ALL">All Subjects</option>
      <option value="CDP">CDP</option>
      <option value="MATH">Math</option>
      <option value="EVS">EVS</option>
    </select>
    
<select id="questionLimit" class="subject-dropdown">
  <option value="10">10 Questions</option>
  <option value="20">20 Questions</option>
  <option value="30" selected>30 Questions</option>
  <option value="50">50 Questions</option>
  <option value="ALL">All Questions</option>
</select>

    <div class="weak-btn" onclick="goWeakPage()">
      🧠 Weak Concepts
    </div>
  </div>

</div>  

<!-- PROGRESS -->
<div class="progress-wrap">

  <div class="progress">
    <div id="progressBar"></div>
    <div class="progress-info" id="progressInfo">
      1 / 30
    </div>
  </div>

</div>


<!-- QUESTION -->
<div class="card" id="qBox"></div>

<!-- OPTIONS -->
<div id="options"></div>

<!-- ANSWER STATUS -->
<div id="answerStatus"></div>

<!-- EXPLANATION -->
<div id="explainBox"
     class="card"
     style="display:none;">
</div>

<!-- NAV BUTTONS -->

<button class="nav-float nav-prev" onclick="prevQ()">
  ⬅
  
</button>

<button class="nav-float nav-next" onclick="nextQ()">
  ➡
 
</button>

<!-- SNACKBAR -->
<div id="snackbar"></div>

<!-- JS -->
<script type="module"
        src="../../../js/CDP/MCQ/vygotsky_mcq.js">
</script>


</body>
</html>
