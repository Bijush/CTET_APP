<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
ADRE Reasoning
</title>

<link
rel="stylesheet"
href="../css/adre/style.css">

</head>

<body>

<div class="container">

    <!-- Header -->

    <header class="header">

        <h1>
            ADRE Reasoning
        </h1>
        <h1>
            <a href="adre_questionPaper.html">Previous Year Question Paper</a>
        </h1>
        <div class="info">

            <span id="subject">
                Syllogism
            </span>

            <span id="progress">
                Question 1 / 100
            </span>

        </div>

    </header>

    <!-- Question Card -->

    <section
    class="card"
    id="questionCard">

        <h2>
            📄 Question
        </h2>

        <div id="questionText">

            Loading...

        </div>

    </section>

    <!-- Options -->

    <section
    class="card"
    id="optionCard">

        <h2>
            Choose Answer
        </h2>

        <div id="options">

        </div>

        <button
        id="submitBtn">

            Submit Answer

        </button>

    </section>

    <!-- Result -->

    <section
    class="card hidden"
    id="resultCard">

        <h2>

            Result

        </h2>

        <div
        id="resultText">

        </div>

    </section>

    <!-- Explanation -->

    <section
    class="card hidden"
    id="explanationCard">

        <h2>

            Explanation

        </h2>

        <div
        id="explanation">

        </div>

    </section>

    <!-- Diagram -->

    <section
    class="card hidden"
    id="diagramCard">

        <h2>

            Venn Diagram

        </h2>

        <div
        id="diagram">

        </div>

    </section>

    <!-- Navigation -->

    <div
    class="navigation">

        <button
        id="prevBtn">

            Previous

        </button>

        <button
        id="nextBtn">

            Next

        </button>

    </div>

</div>

<script
type="module"
src="../js/adre/reasoning/syllogism/app.js">

</script>

</body>

</html>
